<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prism SQL Builder</title>
  <link rel="stylesheet" href="./tailwind.css">
  <script>
    // 僅允許 Chrome 與 Edge，其他瀏覽器顯示警告後關閉視窗。
    // 業務背景：File System Access API 僅 Chromium 核心支援；
    //           在不支援的瀏覽器開啟會導致儲存功能完全失效。
    (function () {
      var ua = navigator.userAgent;
      var isChrome = /Chrome\//.test(ua) && !/Edg\//.test(ua) && !/OPR\//.test(ua);
      var isEdge   = /Edg\//.test(ua);
      if (!isChrome && !isEdge) {
        alert('Prism SQL Builder 僅支援 Chrome 或 Edge 瀏覽器。\n請改用 Chrome / Edge 開啟。');
        window.close();
      }
    })();
  </script>
</head>
<body class="bg-zinc-50 dark:bg-[#111111] text-zinc-900 dark:text-zinc-50 min-h-screen">
  <div id="app"></div>

  <!-- 依賴載入順序：Vue → Mermaid → Parser → Builder → Components → App -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <script>
    // Mermaid 初始化：關閉自動掃描，使用深色主題配合整體深色背景
    document.addEventListener('DOMContentLoaded', function() {
      mermaid.initialize({ startOnLoad: false, theme: 'dark', securityLevel: 'loose' })
    })
  </script>
  <script src="./src/parser/ddl-parser.js"></script>
  <script src="./src/storage/local-storage.js"></script>
  <script src="./src/storage/file-system.js"></script>
  <script src="./src/storage/md-format.js"></script>
  <script src="./src/builder/select-builder.js"></script>
  <script src="./src/builder/join-builder.js"></script>
  <script src="./src/builder/dml-builder.js"></script>
  <script src="./src/components/JoinBuilder.js"></script>
  <script src="./src/components/DmlPanel.js"></script>
  <script src="./src/components/TablePanel.js"></script>
  <script src="./src/components/SqlPreview.js"></script>
  <script src="./src/components/ConditionBuilder.js"></script>
  <script src="./src/components/SortLimitPanel.js"></script>
  <script src="./src/components/ErdPanel.js"></script>
  <script src="./src/app.js"></script>
</body>
</html>
