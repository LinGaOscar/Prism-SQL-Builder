name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 部署所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只允許一個部署，避免並發寫入衝突
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # vendor/ 快取：Vue 與 Mermaid 不常變動，避免每次重新下載
      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor/
          key: vendor-${{ hashFiles('scripts/build.ps1') }}

      - name: Download Tailwind CSS CLI
        run: |
          curl -sL https://github.com/tailwindlabs/tailwindcss/releases/latest/download/tailwindcss-linux-x64 -o tailwindcss
          chmod +x tailwindcss

      - name: Generate tailwind.css
        run: ./tailwindcss -i ./storage/input.css -o ./storage/tailwind.css --minify

      - name: Build prism.html
        run: pwsh ./scripts/build.ps1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
